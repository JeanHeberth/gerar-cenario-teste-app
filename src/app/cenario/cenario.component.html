<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <div>
        <span class="me-2">🖊️</span>
        <strong>Gerador de Cenário de Teste</strong>
      </div>

      <button class="btn btn-outline-light btn-sm" (click)="irParaCenarios()">
        👀 Visualizar Cenários
      </button>
    </div>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="gerar()">
        <div class="mb-3">
          <label class="form-label">Título</label>
          <input
            type="text"
            formControlName="titulo"
            class="form-control"
            placeholder="Digite o título do cenário"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Regra de Negócio</label>
          <textarea
            formControlName="regraDeNegocio"
            rows="3"
            class="form-control"
            placeholder="Descreva a regra de negócio"
          ></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">
            📎 Anexar PDFs (um ou mais arquivos, Devbox, Estimativas, etc.)
          </label>

          <input
            type="file"
            accept="application/pdf"
            multiple
            class="form-control"
            (change)="selecionarPdf($event)"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">
            📁 Selecionar pasta com PDFs
          </label>

          <input
            type="file"
            accept="application/pdf"
            multiple
            webkitdirectory
            directory
            class="form-control"
            (change)="selecionarPdf($event)"
          />
        </div>

        <div *ngIf="arquivosPdfSelecionados.length > 0" class="mt-2">
          <small class="text-success d-block">
            PDFs selecionados:
          </small>

          <ul class="mb-2">
            <li *ngFor="let arquivo of arquivosPdfSelecionados">
              <small>{{ arquivo.name }}</small>
            </li>
          </ul>

          <button
            type="button"
            class="btn btn-outline-danger btn-sm"
            (click)="limparPdfs()"
          >
            🗑️ Limpar PDFs
          </button>
        </div>

        <div class="d-grid">
          <button
            type="submit"
            class="btn btn-success"
            [disabled]="form.invalid || loading"
          >
            {{ loading ? '⏳ Gerando...' : '🚀 Gerar Cenário' }}
          </button>
        </div>
      </form>

      <div *ngIf="successMessage" class="alert alert-success mt-3 text-center">
        {{ successMessage }}
      </div>
    </div>
  </div>
</div>
