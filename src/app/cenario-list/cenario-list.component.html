<div class="container mt-4">
  <!-- Botão pequeno à direita -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="titulo-cenarios">
      🧾 Cenários Gerados
    </h3>

    <a routerLink="/" class="btn btn-outline-secondary voltar-btn">
      🔙 Voltar para criação
    </a>
  </div>

  <div *ngFor="let cenario of cenarios" class="card" (click)="cenario.expanded = !cenario.expanded">
    <div class="card-body">
      <h5>
        📝 {{ cenario.titulo }}
      </h5>
      <p>{{ cenario.regraDeNegocio }}</p>

      <div *ngIf="cenario.expanded">
        <label class="fw-bold">Cenário:</label>
        <pre>{{ cenario.cenarioGerado }}</pre>
      </div>

      <div class="export-buttons">
        <button (click)="exportar(cenario, 'doc')" class="btn btn-outline-success" title="Exportar para .doc">
          📄 .doc
        </button>
        <button (click)="exportar(cenario, 'xlsx')" class="btn btn-outline-info" title="Exportar para .xlsx">
          📊 .xlsx
        </button>
      </div>
    </div>
  </div>

</div>
