<div class="chat-page">

  <div class="chat-header">
    <div class="chat-header-left">
      <span class="chat-header-icon">💬</span>
      <span class="chat-header-title">Chat com Agentes</span>
    </div>
    <div class="chat-header-right">
      <button class="btn-new-chat" (click)="newChat()" title="Iniciar novo chat">
        ✏️ Novo Chat
      </button>
    </div>
  </div>

  <div class="messages-area">

    <div class="empty-state" *ngIf="messages.length === 0 && !loading && agents.length > 0">
      <div class="empty-icon">🤖</div>
      <h2 class="empty-title">Como posso ajudar?</h2>
      <p class="empty-subtitle">
        Selecione um agente e envie uma mensagem para começar.
      </p>
    </div>

    <div class="messages-list" *ngIf="messages.length > 0 || loading">
      <div
        *ngFor="let msg of messages"
        class="message-row"
        [class.user-row]="msg.role === 'user'"
        [class.assistant-row]="msg.role === 'assistant'"
      >
        <div class="message-avatar" *ngIf="msg.role === 'assistant'">🤖</div>

        <div class="message-bubble" [class.user-bubble]="msg.role === 'user'" [class.assistant-bubble]="msg.role === 'assistant'">
          <div class="message-content" [innerHTML]="formatContent(msg.content)"></div>
        </div>

        <div class="message-avatar user-avatar" *ngIf="msg.role === 'user'">👤</div>
      </div>

      <div class="message-row assistant-row" *ngIf="loading">
        <div class="message-avatar">🤖</div>
        <div class="message-bubble assistant-bubble typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div #messagesEnd></div>
    </div>

    <div class="empty-state" *ngIf="agents.length === 0">
      <div class="empty-icon">⚠️</div>
      <h2 class="empty-title">Nenhum agente disponivel</h2>
      <p class="empty-subtitle" *ngIf="agentsMessage">{{ agentsMessage }}</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">

      <textarea
        class="input-textarea"
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        placeholder="Envie uma mensagem..."
        rows="1"
        [disabled]="loading || agents.length === 0"
      ></textarea>

      <div class="input-footer">
        <div class="agent-selector-wrapper">
          <select
            class="agent-select"
            [(ngModel)]="selectedAgent"
            [disabled]="loading || agents.length === 0"
            title="Selecionar agente"
          >
            <option value="" disabled>Selecionar agente</option>
            <option *ngFor="let agent of agents" [value]="agent.id">
              {{ getAgentLabel(agent.id) }}
            </option>
          </select>
          <span class="select-arrow">⌄</span>
        </div>

        <button
          class="send-button"
          [class.active]="userInput.trim() && selectedAgent && !loading"
          [disabled]="!userInput.trim() || !selectedAgent || loading"
          (click)="sendMessage()"
          title="Enviar (Enter)"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
          </svg>
        </button>
      </div>

    </div>
    <p class="input-hint">Pressione Enter para enviar · Shift+Enter para nova linha</p>
  </div>

</div>
